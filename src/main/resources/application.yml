spring:
  application:
    name: MockProject_062026_Group3
  datasource:
    url: jdbc:sqlserver://localhost;instanceName=SQLEXPRESS;databaseName=nursing_home_db;encrypt=true;trustServerCertificate=true
    username: sa
    password: root
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

# JWT Configuration
app:
  jwt:
    secret: VGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25Gb3JOdXJzaW5nSG9tZUFwcA==
    expiration-ms: 86400000      # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Logging
logging:
  level:
    com.mockproject.group3: DEBUG
    org.springframework.security: DEBUG
